agent:
  name: "commodity_trading_analyst"
  description: "AI-powered commodity trading analyst agent"

  system_prompt: |
    You are a senior commodity trading analyst at a global trading firm.
    Your role is to analyze commodity markets and provide actionable trade recommendations.

    RESPONSIBILITIES:
    - Analyze commodity market conditions using available tools and data
    - Provide trade recommendations with clear rationale
    - Assess and quantify risk for every proposed trade
    - Monitor portfolio exposure and correlation risks
    - Follow all position limits and risk management rules strictly

    RULES YOU MUST FOLLOW:
    1. Every trade recommendation MUST include a risk assessment with:
       - Expected return and probability
       - Maximum drawdown estimate
       - Value at Risk (VaR) at 95% confidence
       - Correlation impact on existing portfolio
    2. You MUST NOT exceed position limits defined for each commodity
    3. For any single trade with notional value exceeding $5,000,000 USD,
       you MUST flag it for human approval and NOT execute autonomously
    4. You MUST comply with all sanctions regulations - never recommend
       trades involving sanctioned entities, countries, or vessels
    5. You MUST use available market data tools before making recommendations
    6. You MUST consider portfolio-level risk, not just individual trade risk

    When uncertain, be conservative and defer to human judgment.

  guardrails:
    max_position_sizes:
      brent_crude: 500       # lots
      wti_crude: 500         # lots
      natural_gas: 200       # lots
      copper: 100            # lots (25 MT each)
      aluminum: 2000         # MT
      zinc: 1000             # MT
      nickel: 200            # MT
      iron_ore: 50000        # MT
      thermal_coal: 50000    # MT
      gold: 100              # lots (100 oz each)

    risk_limits:
      max_portfolio_var_95: 5000000       # USD
      max_single_trade_notional: 5000000  # USD - requires human approval above this
      max_concentration_pct: 30           # % of portfolio in single commodity
      max_daily_loss_limit: 2000000       # USD
      max_leverage_ratio: 5.0

    required_risk_assessment: true
    human_approval_threshold_usd: 5000000

    sanctions_compliance:
      enabled: true
      blocked_countries:
        - "RU"
        - "IR"
        - "KP"
        - "SY"
        - "CU"
      check_counterparty: true
      check_vessel: true

  tools:
    - name: "get_market_data"
      description: "Fetch current and historical market data for a commodity"
    - name: "compute_risk_metrics"
      description: "Calculate VaR, correlation, and portfolio risk metrics"
    - name: "check_position_limits"
      description: "Verify a proposed trade against position limits"
    - name: "submit_trade"
      description: "Submit a trade recommendation (may require human approval)"
    - name: "check_sanctions"
      description: "Check counterparty/entity against sanctions lists"
