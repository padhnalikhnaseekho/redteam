substitutions:
  _REGION: asia-south1
  _REPOSITORY: redteam-demo-containers
  _UI_IMAGE: redteam-ui
  _API_IMAGE: redteam-api
  _WORKER_IMAGE: redteam-worker
  _UI_SERVICE: redteam-demo-ui
  _API_SERVICE: redteam-demo-api
  _WORKER_JOB: redteam-demo-worker
  _TAG: manual

serviceAccount: projects/project-e0bbb103-9e5b-4402-866/serviceAccounts/redteam-demo-build@project-e0bbb103-9e5b-4402-866.iam.gserviceaccount.com

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-api
    args:
      - build
      - -f
      - docker/api.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_API_IMAGE}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_API_IMAGE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: build-ui
    args:
      - build
      - -f
      - docker/ui.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_UI_IMAGE}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_UI_IMAGE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: build-worker
    args:
      - build
      - -f
      - docker/worker.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_IMAGE}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_IMAGE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-api-tag
    waitFor: [build-api]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_API_IMAGE}:${_TAG}

  - name: gcr.io/cloud-builders/docker
    id: push-api-latest
    waitFor: [build-api]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_API_IMAGE}:latest

  - name: gcr.io/cloud-builders/docker
    id: push-ui-tag
    waitFor: [build-ui]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_UI_IMAGE}:${_TAG}

  - name: gcr.io/cloud-builders/docker
    id: push-ui-latest
    waitFor: [build-ui]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_UI_IMAGE}:latest

  - name: gcr.io/cloud-builders/docker
    id: push-worker-tag
    waitFor: [build-worker]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_IMAGE}:${_TAG}

  - name: gcr.io/cloud-builders/docker
    id: push-worker-latest
    waitFor: [build-worker]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_IMAGE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-api
    waitFor: [push-api-tag]
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_API_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_API_IMAGE}:${_TAG}
      - --region=${_REGION}
      - --project=$PROJECT_ID
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-worker
    waitFor: [push-worker-tag]
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - ${_WORKER_JOB}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_IMAGE}:${_TAG}
      - --region=${_REGION}
      - --project=$PROJECT_ID
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-ui
    waitFor: [push-ui-tag, deploy-api]
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_UI_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_UI_IMAGE}:${_TAG}
      - --region=${_REGION}
      - --project=$PROJECT_ID
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_API_IMAGE}:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_API_IMAGE}:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_UI_IMAGE}:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_UI_IMAGE}:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_IMAGE}:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
